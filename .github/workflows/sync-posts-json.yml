# 从 posts/*.md 的 YAML 头生成 posts.json（仅 main，避免与仅改 json 的提交形成循环）
name: Sync posts.json

on:
  push:
    branches:
      - main
    paths:
      - "posts/**/*.md"
      - "scripts/build_posts_index.py"
      - ".github/workflows/sync-posts-json.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Build posts.json
        run: python scripts/build_posts_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json"
            exit 0
          fi
          git commit -m "chore: sync posts.json from Markdown front matter"
          git push
