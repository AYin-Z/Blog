# 从 posts/*.md 的 YAML 头生成 posts.json（仅 main，避免与仅改 json 的提交形成循环）
name: Sync Posts

on:
  push:
    branches:
      - main
    paths:
      - "posts/**/*.md"
      - "posts/**/*"
      - "scripts/build_posts_index.py"
      - "scripts/organize_resources.py"
      - ".github/workflows/sync-posts.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            posts/
            scripts/
            posts.json
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: scripts/build_posts_index.py

      - name: Install dependencies
        run: pip install --no-cache-dir pyyaml

      - name: Organize resources
        run: python scripts/organize_resources.py

      - name: Build posts.json
        run: python scripts/build_posts_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json"
            exit 0
          fi
          git commit -m "chore: sync posts.json from Markdown front matter"
          git push
